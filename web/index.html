<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Live QR — Real-time QR code scanning and display system" />
    <meta name="theme-color" content="#2563EB" />
    <meta property="og:title" content="Live QR" />
    <meta property="og:description" content="Real-time QR code scanning and display system" />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Live QR</title>
    <!-- Prevent flash of wrong theme (FOUC) -->
    <script>
      (function(){try{var p=JSON.parse(localStorage.getItem('app-preferences')||'{}');
      var d=p.theme==='dark'||(p.theme==='auto'&&window.matchMedia('(prefers-color-scheme:dark)').matches);
      if(d)document.documentElement.classList.add('dark')}catch(e){}})();
    </script>
  </head>
  <body class="bg-gray-50 dark:bg-gray-900 min-h-screen">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
